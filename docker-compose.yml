services:
  frontend:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - frontend-net
    depends_on:
      - backend

  backend:
    build: 
      context: ./backend
    ports:
      - "3001:3001"
    # environment:
    #   - PORT=3001 
    #   - DATABASE_URL=postgresql://app:secret@db:5432/myapp
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - frontend-net
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=myapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d myapp"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:

networks:
  frontend-net:
  backend-net:

secrets:
  db_password:
    file: ./db_password.txt